<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하나사인몰 전자결재 · 지출/이체 결재</title>
<style>
  :root{
    --navy:#1f3a5f; --navy2:#274c78; --line:#dfe4ea; --bg:#f4f6f9;
    --ink:#1b2733; --sub:#5b6b7b; --ok:#1a7f4b; --okbg:#e7f6ee;
    --no:#c0392b; --nobg:#fbeceb; --wait:#b8860b; --waitbg:#fdf6e3;
    --accent:#2f6fed;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","맑은 고딕",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.55;-webkit-text-size-adjust:100%}
  .wrap{max-width:680px;margin:0 auto;padding:16px 14px 60px}
  header.brand{display:flex;align-items:center;gap:10px;padding:6px 2px 14px}
  header.brand .logo{width:36px;height:36px;border-radius:9px;background:var(--navy);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;letter-spacing:-1px}
  header.brand b{font-size:16px}
  header.brand span{color:var(--sub);font-size:12px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 16px;margin-bottom:14px;
    box-shadow:0 1px 3px rgba(20,40,70,.05)}
  h2.sec{font-size:15px;margin:2px 0 14px;color:var(--navy);display:flex;align-items:center;gap:7px}
  h2.sec:before{content:"";width:4px;height:15px;background:var(--navy);border-radius:2px;display:inline-block}
  label{display:block;font-size:12.5px;color:var(--sub);margin:12px 0 5px;font-weight:600}
  input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;
    font-size:15px;font-family:inherit;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,111,237,.12)}
  textarea{min-height:64px;resize:vertical}
  .row2{display:flex;gap:10px}.row2>div{flex:1}
  .divider{border-top:1px solid var(--line);margin:16px 0 2px}
  .addrow{display:flex;gap:8px;margin-top:2px}
  .addrow>div{flex:1}
  .additem{width:100%;padding:11px;border:1px dashed #b9c4d0;background:#fafcff;border-radius:9px;
    color:var(--navy2);font-weight:700;cursor:pointer;font-size:14px;margin-top:10px}
  .hint{font-size:11.5px;color:#8494a3;margin-top:7px}
  .totalbar{margin-top:14px;padding:12px 14px;background:var(--navy);color:#fff;border-radius:11px;font-size:14px}
  .totalbar .r{display:flex;justify-content:space-between;align-items:center;padding:2px 0}
  .totalbar .r b{font-size:19px}
  .totalbar .r.sub{opacity:.85;font-size:13px}
  .totalbar .r.sub b{font-size:15px}
  .btn{display:block;width:100%;padding:15px;border:none;border-radius:12px;font-size:16px;font-weight:700;
    cursor:pointer;margin-top:14px;font-family:inherit}
  .btn.primary{background:var(--accent);color:#fff}
  .btn.approve{background:var(--ok);color:#fff}
  .btn.reject{background:#fff;color:var(--no);border:1.5px solid var(--no);margin-top:10px}
  .btn.ghost{background:#fff;color:var(--navy2);border:1.5px solid var(--line)}
  .btn:active{transform:translateY(1px)}

  .doc-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;
    border-bottom:2px solid var(--navy);padding-bottom:12px;margin-bottom:4px}
  .doc-title{font-size:19px;font-weight:800;color:var(--navy);letter-spacing:-.3px}
  .doc-no{font-size:11.5px;color:var(--sub);margin-top:3px}
  .stampbox{border:1px solid var(--navy);border-radius:8px;overflow:hidden;min-width:108px;flex-shrink:0}
  .stampbox .st-h{background:var(--navy);color:#fff;font-size:11px;text-align:center;padding:3px}
  .stampbox .st-b{min-height:92px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;font-size:11px;color:var(--sub);position:relative;padding:8px 4px}
  .stampbox.approved .st-b{color:var(--ok)}
  .stampbox.rejected .st-b{color:var(--no)}
  .stampbox .mark{font-size:16px;font-weight:800;border:2.5px solid currentColor;border-radius:50%;
    width:38px;height:38px;display:flex;align-items:center;justify-content:center;transform:rotate(-8deg);margin-bottom:1px}
  .stampbox .who{font-size:11.5px;font-weight:700;color:var(--ink);line-height:1.1}
  .stampbox .when{font-size:9px;color:#8494a3;line-height:1.1}
  table.kv{width:100%;border-collapse:collapse;margin-top:14px;font-size:13.5px}
  table.kv th,table.kv td{border:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top}
  table.kv th{background:#f7f9fc;color:var(--sub);width:34%;font-weight:600;white-space:nowrap}
  table.det{width:100%;border-collapse:collapse;margin-top:12px;font-size:13px}
  table.det th,table.det td{border:1px solid var(--line);padding:8px 9px}
  table.det th{background:#f7f9fc;color:var(--sub);font-weight:600;font-size:12px}
  table.det td.n{text-align:right;white-space:nowrap}
  table.det tr.sum td{background:#fbfcfe;font-weight:800;color:var(--navy);font-size:13.5px}
  .delrow{border:1px solid var(--line);background:#fff;border-radius:7px;height:30px;width:30px;cursor:pointer;
    color:var(--no);font-size:16px;line-height:1;padding:0}
  .banner{padding:15px;border-radius:12px;text-align:center;margin-bottom:14px;font-weight:700}
  .banner.ok{background:var(--okbg);color:var(--ok)}
  .banner.no{background:var(--nobg);color:var(--no)}
  .banner.wait{background:var(--waitbg);color:var(--wait)}
  .banner .big{font-size:20px;display:block;margin-bottom:3px}
  .banner .sm{font-size:12.5px;font-weight:600;opacity:.9}
  .linkbox{margin-top:12px;background:#f7f9fc;border:1px solid var(--line);border-radius:10px;padding:12px}
  .linkbox .lk{font-size:12px;color:var(--navy2);word-break:break-all;background:#fff;border:1px solid var(--line);
    border-radius:7px;padding:9px;max-height:76px;overflow:auto}
  .steps{font-size:12.5px;color:var(--sub);margin:9px 0 0;padding-left:18px}
  .steps li{margin:3px 0}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1b2733;color:#fff;
    padding:11px 18px;border-radius:24px;font-size:13.5px;opacity:0;pointer-events:none;transition:.25s;z-index:9}
  .toast.show{opacity:1}
  .pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700}
  .pill.pay{background:#eef3ff;color:var(--accent)}
  .foot{text-align:center;font-size:11px;color:#9aa7b4;margin-top:18px}
  .tabs{display:flex;gap:6px;margin-bottom:14px}
  .tabs button{flex:1;padding:9px;border:1px solid var(--line);background:#fff;border-radius:9px;
    font-weight:700;color:var(--sub);cursor:pointer;font-size:13px}
  .tabs button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .empty{color:#9aa7b4;font-size:12.5px;text-align:center;padding:16px 0;border:1px dashed var(--line);border-radius:9px;margin-top:10px}
  /* Firebase 규칙 변경 안내 */
  .fbrem{background:#fff8e1;border:1px solid #f0d98a;border-radius:12px;padding:12px 14px;margin-bottom:12px}
  .fbrem.urgent{background:#fdecea;border-color:#f1a9a0}
  .fbrem .t{font-weight:800;color:#8a6d00;font-size:13.5px}
  .fbrem.urgent .t{color:var(--no)}
  .fbrem .s{font-size:11.5px;color:#6b5b2a;margin-top:4px;line-height:1.5}
  .fbrem.urgent .s{color:#7a3b34}
  .fbrem .x{margin-top:9px;background:#fff;border:1px solid #e0d3a0;border-radius:8px;padding:7px 10px;
    font-size:11.5px;font-weight:700;color:#8a6d00;cursor:pointer;width:100%}
  .todaybar{font-size:11.5px;color:var(--sub);text-align:right;margin:-6px 2px 8px;font-weight:600}
  /* 결재 현황 */
  .live{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--ok);
    margin-left:auto;background:var(--okbg);padding:3px 9px;border-radius:20px}
  .live .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .strow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px;
    border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer;background:#fff}
  .strow:active{background:#f7f9fc}
  .sttitle{font-weight:700;font-size:14px;color:var(--ink)}
  .stsub{font-size:11.5px;color:var(--sub);margin-top:2px}
  .stbadge{flex-shrink:0;font-size:12.5px;font-weight:800;padding:7px 13px;border-radius:20px;white-space:nowrap}
  .stbadge.w{background:var(--waitbg);color:var(--wait)}
  .stbadge.a{background:var(--okbg);color:var(--ok)}
  .stbadge.r{background:var(--nobg);color:var(--no)}
  .stfilter{display:flex;gap:6px;margin:2px 0 12px}
  .stfilter button{flex:1;padding:7px;border:1px solid var(--line);background:#fff;border-radius:8px;
    font-size:12px;font-weight:700;color:var(--sub);cursor:pointer}
  .stfilter button.on{background:var(--navy2);color:#fff;border-color:var(--navy2)}
</style>
</head>
<body>
<div class="wrap">
  <header class="brand">
    <div class="logo">HS</div>
    <div><b>하나사인몰 전자결재</b><br><span>지출 · 이체 결재 요청 / 승인</span></div>
  </header>
  <div id="app"></div>
  <div class="foot">하나사인몰 웹팀 · 카톡 결재 대체용 · 대표님 승인 시 결재현황 실시간 반영</div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ===== Firebase Realtime Database (REST + SSE, SDK 불필요) ===== */
var DB='https://hanasm-approval-default-rtdb.firebaseio.com';
function fbPut(path,obj){ return fetch(DB+path+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(obj)}); }
function fbGet(path){ return fetch(DB+path+'.json').then(function(r){return r.json();}); }

/* ===== 유틸: 한글 안전 URL-safe base64 ===== */
function enc(obj){
  var b64 = btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
  return b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function dec(str){
  try{
    var b64 = str.replace(/-/g,'+').replace(/_/g,'/');
    while(b64.length%4) b64+='=';
    return JSON.parse(decodeURIComponent(escape(atob(b64))));
  }catch(e){return null;}
}
function num(v){ return Number(String(v==null?'':v).replace(/[^0-9]/g,''))||0; }
function won(n){ return (Number(n)||0).toLocaleString('ko-KR')+'원'; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
function nl2br(s){ return esc(s).replace(/\n/g,'<br>'); }
function pad(n){return n<10?'0'+n:''+n;}
function nowISO(){ return new Date().toISOString(); }
function fmt(iso){
  if(!iso) return '';
  var d=new Date(iso); if(isNaN(d)) return iso;
  return d.getFullYear()+'.'+pad(d.getMonth()+1)+'.'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}
function docNo(){
  var d=new Date();
  return 'HS-'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'-'+pad(d.getHours())+pad(d.getMinutes())+pad(d.getSeconds());
}
function baseUrl(){ return location.origin + location.pathname; }
function toast(m){
  var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show');
  clearTimeout(window._tt); window._tt=setTimeout(function(){t.classList.remove('show');},2000);
}
function copy(text,msg){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){toast(msg||'복사되었습니다');},function(){fallbackCopy(text,msg);});
  }else{fallbackCopy(text,msg);}
}
function fallbackCopy(text,msg){
  var ta=document.createElement('textarea'); ta.value=text;
  ta.style.position='fixed';ta.style.opacity='0'; document.body.appendChild(ta);
  ta.select(); try{document.execCommand('copy');toast(msg||'복사되었습니다');}catch(e){toast('복사 실패 — 링크를 길게 눌러 복사하세요');}
  document.body.removeChild(ta);
}

/* ===== Firebase 규칙 변경 안내 (테스트 모드 만료 대비) ===== */
var FB_DEADLINE='2026-08-16';
function fbDaysLeft(){
  var end=new Date(FB_DEADLINE+'T23:59:59');
  return Math.ceil((end - new Date())/86400000);
}
function fbDone(){ try{return localStorage.getItem('fb_rules_done_v2')==='1';}catch(e){return false;} }
function fbReminderHtml(){
  if(fbDone()) return '<div class="todaybar">오늘 '+fmt(nowISO()).split(' ')[0]+'</div>';
  var dl=fbDaysLeft();
  var urgent = dl<=10;
  var dtxt = dl>=0 ? 'D-'+dl : '기한 지남!';
  return '<div class="fbrem'+(urgent?' urgent':'')+'">'+
    '<div class="t">⚠️ Firebase 규칙 변경 '+dtxt+' — 기한 2026.08.16</div>'+
    '<div class="s">오늘 <b>'+fmt(nowISO()).split(' ')[0]+'</b> · 이 날짜까지 Firebase 규칙을 한 번만 바꾸면 <b>영구 해결</b>됩니다. 안 바꾸면 결재 시스템이 멈춥니다.<br>콘솔 → Realtime Database → 규칙 → 저장된 안내 JSON 붙여넣고 게시.</div>'+
    '<button class="x" id="fbDoneBtn">✔ 규칙 변경 완료했어요 (이 안내 숨기기)</button>'+
  '</div>';
}
function bindFbReminder(){
  var b=document.getElementById('fbDoneBtn');
  if(b) b.onclick=function(){
    if(!confirm('Firebase 규칙을 실제로 변경하셨나요?\n확인을 누르면 이 안내가 사라집니다. (아직 안 바꿨으면 취소)')) return;
    try{localStorage.setItem('fb_rules_done_v2','1');}catch(e){} route();
  };
}

/* ===== 실시간 스트림 정리 ===== */
function closeES(){
  if(window._es){ try{window._es.close();}catch(e){} window._es=null; }
  if(window._poll){ clearInterval(window._poll); window._poll=null; }
}

/* ===== 상태 결정 ===== */
function route(){
  closeES();
  var h=location.hash.slice(1);
  if(h.indexOf('done=')===0){ var d=dec(h.slice(5)); if(d) return renderDone(d); }
  if(h.indexOf('req=')===0){ var r=dec(h.slice(4)); if(r) return renderApprove(r); }
  if(h==='list') return renderStatus();
  return renderForm();
}
function tabsHtml(active){
  return '<div class="tabs">'+
    '<button class="'+(active==='new'?'on':'')+'" id="tabNew">새 결재요청</button>'+
    '<button class="'+(active==='list'?'on':'')+'" id="tabList">결재 현황</button></div>';
}
function bindTabs(){
  var n=document.getElementById('tabNew'), l=document.getElementById('tabList');
  if(n) n.onclick=function(){ if(location.hash){location.hash='';} else renderForm(); };
  if(l) l.onclick=function(){ location.hash='list'; };
}

/* ===== 1) 작성 폼 (누적형 + Firebase 저장) ===== */
function renderForm(pre){
  pre = pre || {};
  var app=document.getElementById('app');
  app.innerHTML = fbReminderHtml()+tabsHtml('new')+'<div id="pane"></div>';
  bindTabs(); bindFbReminder();

  var items = (pre.items&&pre.items.length)? pre.items.slice() : [];

  document.getElementById('pane').innerHTML =
  '<div class="card">'+
    '<h2 class="sec">결재요청 작성</h2>'+
    '<div class="row2">'+
      '<div><label>요청자</label><input id="f_req" value="'+esc(pre.requester||'이하나 대리')+'"></div>'+
      '<div><label>결제/지출 유형</label><select id="f_pay">'+
        ['이체','카드','기타'].map(function(o){return '<option'+(pre.payType===o?' selected':'')+'>'+o+'</option>';}).join('')+
      '</select></div>'+
    '</div>'+
    '<div class="divider"></div>'+
    '<label>결재 항목 추가</label>'+
    '<div class="addrow">'+
      '<div><input id="i_buy" inputmode="numeric" placeholder="매입가"></div>'+
      '<div><input id="i_sell" inputmode="numeric" placeholder="판매가"></div>'+
    '</div>'+
    '<input id="i_note" style="margin-top:8px" placeholder="비고 (거래처 / 품목 등)">'+
    '<button class="additem" id="addItem">＋ 항목 추가 (아래에 누적)</button>'+
    '<div class="hint">거래처가 한 곳이든 여러 곳이든, 여러 품목을 이 요청서 하나에 모두 담아 한 번에 결재받을 수 있습니다.</div>'+
    '<div id="itemList"></div>'+
    '<div class="totalbar" id="totalBar"></div>'+
    '<button class="btn primary" id="makeLink">결재요청 링크 생성</button>'+
    '<button class="btn ghost" id="resetForm">새로 작성 (초기화)</button>'+
    '<div id="linkOut"></div>'+
  '</div>';

  function drawList(){
    var box=document.getElementById('itemList');
    if(!items.length){
      box.innerHTML='<div class="empty">추가된 항목이 없습니다. 위에서 입력 후 [항목 추가]를 누르세요.</div>';
    }else{
      box.innerHTML='<table class="det"><tr><th style="width:7%">No</th><th>비고</th>'+
        '<th style="width:22%">매입가</th><th style="width:22%">판매가</th><th style="width:11%"></th></tr>'+
        items.map(function(it,i){
          return '<tr><td class="n">'+(i+1)+'</td><td>'+esc(it.note)+'</td>'+
            '<td class="n">'+won(it.buy)+'</td><td class="n">'+won(it.sell)+'</td>'+
            '<td class="n"><button class="delrow" data-d="'+i+'">×</button></td></tr>';
        }).join('')+'</table>';
      box.querySelectorAll('.delrow').forEach(function(b){
        b.onclick=function(){ items.splice(+b.dataset.d,1); drawList(); };
      });
    }
    drawTotal();
  }
  function drawTotal(){
    var bt=items.reduce(function(s,it){return s+num(it.buy);},0);
    var st=items.reduce(function(s,it){return s+num(it.sell);},0);
    document.getElementById('totalBar').innerHTML=
      '<div class="r sub"><span>매입가 합계</span><b>'+won(bt)+'</b></div>'+
      '<div class="r"><span>판매가 합계</span><b>'+won(st)+'</b></div>';
    return {bt:bt,st:st};
  }
  document.getElementById('addItem').onclick=function(){
    var buy=num(document.getElementById('i_buy').value);
    var sell=num(document.getElementById('i_sell').value);
    var note=document.getElementById('i_note').value.trim();
    if(!buy && !sell && !note){toast('매입가·판매가·비고 중 하나 이상 입력하세요');return;}
    items.push({buy:buy,sell:sell,note:note});
    document.getElementById('i_buy').value='';
    document.getElementById('i_sell').value='';
    document.getElementById('i_note').value='';
    document.getElementById('i_buy').focus();
    drawList();
  };
  document.getElementById('resetForm').onclick=function(){
    if(confirm('작성 중인 내용을 모두 비우고 새로 작성할까요?')) renderForm();
  };
  document.getElementById('makeLink').onclick=function(){
    var requester=document.getElementById('f_req').value.trim()||'이하나 대리';
    if(!items.length){toast('결재 항목을 1개 이상 추가하세요');return;}
    var t=drawTotal();
    var data={
      no: pre.no||docNo(),
      requester: requester,
      payType: document.getElementById('f_pay').value,
      items: items.slice(),
      buyTotal: t.bt, sellTotal: t.st,
      title: requester+' 지출결재 ('+items.length+'건)',
      reqAt: pre.reqAt||nowISO(),
      status: 'wait'
    };
    var reqUrl = baseUrl()+'#req='+enc(data);
    var listUrl = baseUrl()+'#list';
    // Firebase에 저장 (현황에 '대기'로 뜸)
    fbPut('/approvals/'+data.no, data).then(function(){toast('결재 현황에 등록되었습니다');})
      .catch(function(){toast('현황 저장 실패(네트워크) — 링크는 정상 작동');});
    var out=document.getElementById('linkOut');
    out.innerHTML =
      '<div class="linkbox">'+
        '<div style="font-weight:700;color:var(--navy);font-size:13.5px;margin-bottom:8px">✅ 결재요청 생성 완료 ('+items.length+'건)</div>'+
        '<div class="lk">'+esc(reqUrl)+'</div>'+
        '<button class="btn primary" style="margin-top:10px" id="cp">① 요청링크 복사 → 대표님께 카톡 전송</button>'+
        '<button class="btn ghost" style="margin-top:8px" id="openStatus">② 결재 현황 열기 (실시간 확인)</button>'+
        '<ol class="steps">'+
          '<li>①번 링크를 <b>대표님께 카톡</b>으로 보내세요.</li>'+
          '<li>대표님이 링크를 열어 <b>승인/반려</b>만 누르면 끝 — <b>회신 안 하셔도</b> 됩니다.</li>'+
          '<li>②번 <b>결재 현황</b>에서 대기 → 승인/반려가 <b>실시간으로 자동</b> 바뀝니다.</li>'+
        '</ol>'+
      '</div>';
    document.getElementById('cp').onclick=function(){copy(reqUrl,'요청링크 복사됨 — 대표님께 카톡으로 보내세요');};
    document.getElementById('openStatus').onclick=function(){location.hash='list';};
    out.scrollIntoView({behavior:'smooth',block:'nearest'});
  };

  drawList();
}

/* ===== 결재 현황 (Firebase 실시간) ===== */
function renderStatus(){
  var app=document.getElementById('app');
  app.innerHTML = fbReminderHtml()+tabsHtml('list')+
  '<div class="card">'+
    '<h2 class="sec">결재 현황 <span class="live"><span class="dot"></span>실시간</span></h2>'+
    '<div class="stfilter">'+
      '<button class="on" data-f="all">전체</button>'+
      '<button data-f="wait">대기</button>'+
      '<button data-f="approved">승인</button>'+
      '<button data-f="rejected">반려</button>'+
    '</div>'+
    '<div id="stBody"><div class="empty">불러오는 중…</div></div>'+
    '<div class="hint">대표님이 승인/반려하면 이 화면이 <b>자동</b>으로 바뀝니다(새로고침 불필요). 항목을 누르면 상세 결재문서가 열립니다.</div>'+
  '</div>';
  bindTabs(); bindFbReminder();
  var store={}, filter='all';
  var body=document.getElementById('stBody');
  document.querySelectorAll('.stfilter button').forEach(function(b){
    b.onclick=function(){
      document.querySelectorAll('.stfilter button').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on'); filter=b.dataset.f; draw();
    };
  });
  function badge(s){
    if(s==='approved') return {c:'a',t:'승인'};
    if(s==='rejected') return {c:'r',t:'반려'};
    return {c:'w',t:'대기'};
  }
  function draw(){
    var arr=Object.keys(store).map(function(k){return store[k];}).filter(Boolean);
    arr.sort(function(a,b){return (b.reqAt||'').localeCompare(a.reqAt||'');});
    if(filter!=='all') arr=arr.filter(function(d){return (d.status||'wait')===filter;});
    if(!arr.length){ body.innerHTML='<div class="empty">해당 상태의 결재가 없습니다.</div>'; return; }
    body.innerHTML=arr.map(function(d){
      var bd=badge(d.status);
      var decided=(d.status==='approved'||d.status==='rejected');
      return '<div class="strow" data-no="'+esc(d.no)+'">'+
        '<div><div class="sttitle">'+esc(d.title||d.no)+'</div>'+
          '<div class="stsub">'+esc(d.requester||'')+' · 판매가 '+won(d.sellTotal)+' · '+fmt(d.reqAt)+'</div>'+
          (decided?'<div class="stsub">결재: '+esc(d.approver||'')+' · '+fmt(d.decidedAt)+(d.reason?' · 사유: '+esc(d.reason):'')+'</div>':'')+
        '</div>'+
        '<div class="stbadge '+bd.c+'">'+bd.t+'</div></div>';
    }).join('');
    body.querySelectorAll('.strow').forEach(function(r){
      r.onclick=function(){ var d=store[r.dataset.no]; if(d) location.hash='req='+enc(d); };
    });
  }
  function refresh(){ fbGet('/approvals').then(function(d){ store=d||{}; draw(); }).catch(function(){}); }
  refresh();
  try{
    var es=new EventSource(DB+'/approvals.json');
    window._es=es;
    es.addEventListener('put', refresh);
    es.addEventListener('patch', refresh);
  }catch(e){}
  window._poll=setInterval(refresh, 12000);
}

/* ===== 문서 본문 렌더 (결재/완료 공용) ===== */
function docBody(d){
  var rows='';
  rows+='<tr><th>문서번호</th><td>'+esc(d.no)+'</td></tr>';
  rows+='<tr><th>요청자</th><td>'+esc(d.requester)+'</td></tr>';
  rows+='<tr><th>요청일시</th><td>'+fmt(d.reqAt)+'</td></tr>';
  rows+='<tr><th>지출유형</th><td><span class="pill pay">'+esc(d.payType||'-')+'</span></td></tr>';
  var det='<table class="det"><tr><th style="width:7%">No</th><th>비고</th>'+
    '<th style="width:23%">매입가</th><th style="width:23%">판매가</th></tr>'+
    (d.items||[]).map(function(it,i){
      return '<tr><td class="n">'+(i+1)+'</td><td>'+esc(it.note)+'</td>'+
        '<td class="n">'+won(it.buy)+'</td><td class="n">'+won(it.sell)+'</td></tr>';
    }).join('')+
    '<tr class="sum"><td colspan="2">합계 ('+((d.items||[]).length)+'건)</td>'+
      '<td class="n">'+won(d.buyTotal)+'</td><td class="n">'+won(d.sellTotal)+'</td></tr></table>';
  return '<table class="kv">'+rows+'</table>'+det;
}
function stamp(d){
  var cls='',head='결 재',body;
  if(d.status==='approved'){ cls='approved';
    body='<div class="mark">承認</div><div class="who">'+esc(d.approver||'대표')+'</div><div class="when">'+fmt(d.decidedAt)+'</div>';
  }else if(d.status==='rejected'){ cls='rejected';
    body='<div class="mark" style="font-size:15px">반려</div><div class="who">'+esc(d.approver||'대표')+'</div><div class="when">'+fmt(d.decidedAt)+'</div>';
  }else{
    body='<div style="font-size:12px;color:#b8860b;font-weight:700">승인 대기</div>';
  }
  return '<div class="stampbox '+cls+'"><div class="st-h">'+head+'</div><div class="st-b">'+body+'</div></div>';
}

/* ===== 2) 대표님 결재 화면 ===== */
function renderApprove(d){
  var app=document.getElementById('app');
  var already = d.status==='approved'||d.status==='rejected';
  app.innerHTML =
  '<div class="card">'+
    (already?'':'<div class="banner wait"><span class="big">🔔 결재 요청이 도착했습니다</span><span class="sm">내용을 확인하고 아래에서 승인 또는 반려하세요</span></div>')+
    '<div class="doc-head"><div><div class="doc-title">'+esc(d.title||'지출/이체 결재요청')+'</div><div class="doc-no">'+esc(d.no)+' · 지출/이체 결재</div></div>'+stamp(d)+'</div>'+
    docBody(d)+
    (d.reason?'<label style="margin-top:14px">반려 사유</label><div style="white-space:pre-wrap;font-size:13px">'+nl2br(d.reason)+'</div>':'')+
    (already? '' :
      '<div style="margin-top:18px">'+
        '<label>결재자 (대표님)</label><input id="ap_name" value="김한열" placeholder="이름">'+
        '<button class="btn approve" id="btnOk">✔ 승인하기</button>'+
        '<button class="btn reject" id="btnNo">✕ 반려하기</button>'+
        '<div class="hint" style="text-align:center;margin-top:8px">버튼을 누르면 요청자 화면(결재 현황)에 자동 반영됩니다. 따로 회신 안 하셔도 됩니다.</div>'+
      '</div>')+
    '<div id="apOut"></div>'+
  '</div>'+
  '<button class="btn ghost" id="goList" style="max-width:680px">📋 결재 현황 보기</button>';

  document.getElementById('goList').onclick=function(){location.hash='list';};

  if(!already){
    document.getElementById('btnOk').onclick=function(){decide(d,'approved');};
    document.getElementById('btnNo').onclick=function(){
      var r=prompt('반려 사유를 입력하세요 (선택)');
      if(r===null) return;
      decide(d,'rejected',r);
    };
    // 이미 다른 곳에서 결재됐는지 확인 (중복 방지)
    fbGet('/approvals/'+d.no).then(function(cur){
      if(cur && (cur.status==='approved'||cur.status==='rejected')){
        renderApprove(Object.assign({},d,cur));
      }
    }).catch(function(){});
  }

  function decide(d,status,reason){
    var name=(document.getElementById('ap_name').value||'대표').trim();
    var done=Object.assign({},d,{status:status,approver:name,decidedAt:nowISO(),reason:reason||''});
    var out=document.getElementById('apOut');
    var isOk=status==='approved';
    // Firebase 저장 (요청자 현황에 자동 반영)
    fbPut('/approvals/'+done.no, done)
      .then(function(){})
      .catch(function(){toast('저장 실패(네트워크) — 다시 시도해주세요');});
    out.innerHTML=
      '<div class="linkbox">'+
        '<div class="banner '+(isOk?'ok':'no')+'" style="margin-bottom:10px"><span class="big">'+(isOk?'✅ 승인 완료':'⛔ 반려 처리')+'</span>'+
          '<span class="sm">'+esc(name)+' · '+fmt(done.decidedAt)+'</span></div>'+
        '<div style="font-weight:700;color:var(--navy);font-size:13px;text-align:center">요청자 화면(결재 현황)에 자동 반영되었습니다.<br>따로 회신하지 않으셔도 됩니다.</div>'+
        '<button class="btn ghost" style="margin-top:12px" id="cpDone">결재 증빙 링크 복사 (선택)</button>'+
      '</div>';
    var url=baseUrl()+'#done='+enc(done);
    document.getElementById('cpDone').onclick=function(){copy(url,'결재 증빙 링크 복사됨');};
    ['btnOk','btnNo','ap_name'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.display='none';});
    out.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}

/* ===== 3) 결재완료(증빙) 화면 ===== */
function renderDone(d){
  var app=document.getElementById('app');
  var isOk=d.status==='approved';
  app.innerHTML=
  '<div class="card">'+
    '<div class="banner '+(isOk?'ok':'no')+'"><span class="big">'+(isOk?'✅ 결재 승인 완료':'⛔ 결재 반려')+'</span>'+
      '<span class="sm">결재자 '+esc(d.approver||'-')+' · '+fmt(d.decidedAt)+'</span></div>'+
    '<div class="doc-head"><div><div class="doc-title">'+esc(d.title||'지출/이체 결재요청')+'</div><div class="doc-no">'+esc(d.no)+' · 지출/이체 결재</div></div>'+stamp(d)+'</div>'+
    docBody(d)+
    (d.reason?'<label style="margin-top:14px">반려 사유</label><div style="white-space:pre-wrap;font-size:13px">'+nl2br(d.reason)+'</div>':'')+
    '<div class="hint" style="margin-top:16px;text-align:center">이 화면이 <b>결재 증빙</b>입니다. 캡처해서 보관하거나 이 링크를 저장하세요.</div>'+
  '</div>'+
  '<button class="btn ghost" id="goList" style="max-width:680px">📋 결재 현황 보기</button>';
  document.getElementById('goList').onclick=function(){location.hash='list';};
}

window.addEventListener('hashchange',route);
route();
</script>
