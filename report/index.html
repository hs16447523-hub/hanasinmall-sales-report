.rem-neg { color: #C00000; font-weight: 600; }
.rem-zero { color: #a0aec0; }
.notice { background: #fff5f5; border-left: 4px solid #C00000; padding: 14px 18px; border-radius: 6px; margin-bottom: 16px; }

footer { text-align: center; color: #a0aec0; font-size: 12px; margin-top: 30px; padding: 20px; }
